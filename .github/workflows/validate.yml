name: Validate marketplace

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Marketplace-level validate only checks marketplace.json — it does NOT
      # recurse into plugin manifests, so each plugin is validated separately.
      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate each plugin
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for plugin in plugins/*/; do
            found=1
            echo "::group::validate ${plugin}"
            claude plugin validate "${plugin}"
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "No plugins found under plugins/" >&2
            exit 1
          fi
